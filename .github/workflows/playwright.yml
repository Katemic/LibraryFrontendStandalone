name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mydb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: Katemic/SoftwareQualityExam
          path: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Build backend
        working-directory: backend
        run: dotnet build --configuration Release --no-restore

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Start backend API
        working-directory: backend
        run: |
          dotnet run --project LibraryAPI/LibraryAPI.csproj --launch-profile Testing > ../api.log 2>&1 &
          echo $! > ../api.pid
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: "server=127.0.0.1;port=3306;database=mydb_test;user=root;password=root;"
          ConnectionStrings__TestConnection: "server=127.0.0.1;port=3306;database=mydb_test;user=root;password=root;"
          Jwt__Key: "this-is-a-test-jwt-key-that-is-long-enough-for-ci"
          Jwt__Issuer: "LibraryAPI"
          Jwt__Audience: "LibraryFrontend"

      - name: Wait for backend API
        run: |
          for i in {1..30}; do
            if curl -s http://127.0.0.1:5153/swagger/index.html > /dev/null; then
              echo "Backend API is ready"
              exit 0
            fi

            echo "Waiting for backend API..."
            sleep 2
          done

          echo "Backend API did not start in time"
          cat api.log
          exit 1

      - name: Check backend is running
        run: curl --fail http://127.0.0.1:5153/swagger/index.html

      - name: Reset test database
        run: |
          curl -i -X POST http://127.0.0.1:5153/api/test/reset-database

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test --project=chromium --workers=1
        env:
          VITE_API_BASE_URL: http://127.0.0.1:5153

      - name: Show backend API logs
        if: always()
        run: cat api.log

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
