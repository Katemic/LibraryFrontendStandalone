name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mydb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: Katemic/SoftwareQualityExam
          path: backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Restore backend
        working-directory: backend
        run: dotnet restore

      - name: Build backend
        working-directory: backend
        run: dotnet build --configuration Release --no-restore

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Create test database schema
        working-directory: backend
        run: mysql -h 127.0.0.1 -uroot -proot mydb_test < LibraryTestUtilities/TestData/test_schema.sql

      - name: Seed test database
        working-directory: backend
        run: mysql -h 127.0.0.1 -uroot -proot mydb_test < LibraryTestUtilities/TestData/test_seed.sql

      - name: Start backend API
        working-directory: backend
        run: |
          dotnet run --project LibraryAPI/LibraryAPI.csproj --launch-profile Testing &
          sleep 20
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ConnectionStrings__DefaultConnection: server=127.0.0.1;port=3306;database=mydb_test;user=root;password=root;
          Jwt__Key: this-is-a-test-jwt-key-that-is-long-enough-for-ci
          Jwt__Issuer: LibraryAPI
          Jwt__Audience: LibraryFrontend

      - name: Check backend is running
        run: curl --fail http://127.0.0.1:5153/swagger/index.html

      - name: Check database reset endpoint
        run: curl --fail -X POST http://127.0.0.1:5153/api/test/reset-database

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test
        env:
          VITE_API_BASE_URL: http://127.0.0.1:5153

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
